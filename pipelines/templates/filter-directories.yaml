parameters:
  - name: services
    type: string
    default: ''

jobs:
- job: filterDirectories
  displayName: Filter only updated directories
  pool: 
    vmImage: ubuntu-24.04
  variables:
    services: ${{ parameters.services }}
  steps:
  - displayName: Checkout Code
    checkout: self
  - displayName: Get updated directories
    name: getUpdatedDirectories
    script: |
     echo "Dectecting changed directories"
     CHANGED_SERVICES=""
     for svc in $(services); do
       if git diff --name-only HEAD~1 HEAD | grep -q  "^$svc/"; then
         echo "$svc changed"
         CHANGED_SERVICES="$CHANGED_SERVICES $svc"
       fi
     done
     echo "##vso[task.setvariable variable=dir_changed;isOutput=true]$CHANGED_SERVICES"
