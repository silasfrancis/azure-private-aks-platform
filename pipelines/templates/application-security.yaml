parameters:
  - name: agent_pool
    type: string

jobs:
- template: ./filter-directories.yaml
  parameters:
    services:
      - backend/fastapi
      - frontend/react-recoil
    agent_pool: ${{ parameters.agent_pool }}

- job: semgrepScan
  dependsOn: filterDirectories
  displayName: Run Semgrep Scan
  variables:
    CHANGED_DIR: $[dependencies.filterDirectories.outputs['getUpdatedDirectories.dir_changed']]
  strategy:
    matrix:
      backend:
        dir: backend/fastapi
      frontend:
        dir: frontend/react-recoil
  pool:
    name: ${{ parameters.agent_pool }}
  condition: ne(variables['CHANGED_DIR'], '')
  
  steps:
  - checkout: self
    displayName: Checkout Code

  - template: ../templated-steps/get-updated-dir.yaml
    parameters:
      changedDir: $(CHANGED_DIR)

  - script: |
        echo "Running Semgrep for: $(updated_dir)"
        docker run --rm \
          -v $(Build.SourcesDirectory):/src \
          -e SEMGREP_APP_TOKEN=$(SEMGREP_APP_TOKEN) \
          semgrep/semgrep:1.150.0 \
          semgrep scan --config auto /src/$(updated_dir)
    displayName: Semgrep Scan
    condition: and(succeeded(), ne(variables['updated_dir'], ''))

- job: dependencyScan
  dependsOn: filterDirectories
  displayName: OWASP Dependency Check
  variables:
    CHANGED_DIR: $[dependencies.filterDirectories.outputs['getUpdatedDirectories.dir_changed']]
  strategy:
    matrix:
      backend:
        dir: backend/fastapi
        cacheKey: backend 
      frontend:
        dir: frontend/react-recoil
        cacheKey: frontend
  pool:
    name: ${{ parameters.agent_pool }}
  condition: ne(variables['CHANGED_DIR'], '')

  steps:
  - checkout: self
    displayName: Checkout Code

  - template: ../templated-steps/get-updated-dir.yaml
    parameters:
      changedDir: $(CHANGED_DIR)

  - script: |
      docker --version
      mkdir -p $(Build.SourcesDirectory)/dependency-check-report
      mkdir -p $(Pipeline.Workspace)/nvd-cache-$(cacheKey)
      rm -f $(Pipeline.Workspace)/nvd-cache-$(cacheKey)/*.lock

      docker run --rm \
        -v $(Build.SourcesDirectory):/repo:ro \
        -v $(Build.SourcesDirectory)/dependency-check-report:/report \
        -v $(Pipeline.Workspace)/nvd-cache-$(cacheKey):/usr/share/dependency-check/data \
        -e NVD_API_KEY=$(NVD_API_KEY) \
        owasp/dependency-check:latest \
        --scan /repo/$(updated_dir) \
        --format HTML \
        --format JSON \
        --project "$(cacheKey)-scan" \
        --failOnCVSS 7 \
        --nvdApiKey $(NVD_API_KEY) \
        --enableExperimental \
        --out /report
    condition: and(succeeded(), ne(variables['updated_dir'], ''))
    displayName: Run OWASP Dependency Check

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(Build.SourcesDirectory)/dependency-check-report'
      artifact: 'dependency-report-$(cacheKey)'
    condition: and(succeeded(), ne(variables['updated_dir'], ''))
    displayName: Publish Dependency Report
