parameters:
  - name: agent_pool
    type: string

jobs:
- template: ./filter-directories.yaml
  parameters:
    services:
      - backend/fastapi
      - frontend/react-recoil
    agent_pool: ${{ parameters.agent_pool }}

- job: semgrepScan
  dependsOn: filterDirectories
  displayName: Run Semgrep Scan
  variables:
    CHANGED_DIR: $[dependencies.filterDirectories.outputs['getUpdatedDirectories.dir_changed']]
  strategy:
    matrix:
      backend:
        dir: backend/fastapi
      frontend:
        dir: frontend/react-recoil
  pool:
    name: ${{ parameters.agent_pool }}
  container: semgrep-dev
  condition: ne(variables['CHANGED_DIR'], '')
  
  steps:
  - checkout: self
    displayName: Checkout Code

  - template: ../templated-steps/get-updated-dir.yaml
    parameters:
      changedDir: $(CHANGED_DIR)

  - script: |
      semgrep scan --config auto $(updated_dir)
    displayName: Semgrep Scan
    condition: and(succeeded(), ne(variables['updated_dir'], ''))
    env:
      SEMGREP_APP_TOKEN: $(SEMGREP_APP_TOKEN)

- job: dependencyScan
  dependsOn: filterDirectories
  displayName: OWASP Dependency Check
  variables:
    CHANGED_DIR: $[dependencies.filterDirectories.outputs['getUpdatedDirectories.dir_changed']]
  strategy:
    matrix:
      backend:
        dir: backend/fastapi
      frontend:
        dir: frontend/react-recoil
  pool:
    name: ${{ parameters.agent_pool }}
  condition: ne(variables['CHANGED_DIR'], '')

  steps:
  - checkout: self
    displayName: Checkout Code

  - template: ../templated-steps/get-updated-dir.yaml
    parameters:
      changedDir: $(CHANGED_DIR)

  - script: |
      docker --version
      mkdir -p $(Build.SourcesDirectory)/dependency-check-report
      docker run --rm \
        -v $(Build.SourcesDirectory):/repo \
        -v $(Build.SourcesDirectory)/dependency-check-report:/report \
        owasp/dependency-check:latest \
        --scan /repo/$(updated_dir) \
        --format HTML \
        --failOnCVSS 7 \
        --out /report
    condition: and(succeeded(), ne(variables['updated_dir'], ''))
    displayName: Run OWASP Dependency Check

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(Build.SourcesDirectory)/dependency-check-report'
      artifact: 'dependency-report-$(dir)'
    condition: and(succeeded(), ne(variables['updated_dir'], ''))
    displayName: Publish Dependency Report
