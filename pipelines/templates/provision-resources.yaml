parameters:
  - name: azureSubscription
    type: string
  - name: agent_pool
    type: string

jobs:
- job: provisionTerraformResources
  displayName: Provision Terraform Resources
  pool:
    name: ${{ parameters.agent_pool }}
  steps:
  - checkout: self
    persistCredentials: true
    displayName: Checkout Code

  - task: TerraformInstaller@1
    inputs:
      terraformVersion: '1.10.5'
    displayName: Install Terraform

  - script: |
      BRANCH="$(Build.SourceBranchName)"
      cd terraform/env/$BRANCH
      terraform fmt -check
    displayName: Terraform Format Check

  - task: AzureCLI@2
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true 
      inlineScript: |
        set -e 

        echo "Using Service Principal for Terraform auth"

        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_TENANT_ID=$tenantId
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_OIDC=true
        export ARM_OIDC_TOKEN=$idToken

        BRANCH="$(Build.SourceBranchName)"
        WORK_DIR="terraform/env/$BRANCH"
        
        echo "=== Working in: $WORK_DIR ==="
        cd "$WORK_DIR"

        echo "=== Terraform Init ==="
        terraform init

        echo "=== Terraform Validate ==="
        terraform validate

        echo "=== Terraform Plan ==="
        terraform plan -out=tfplan -detailed-exitcode || PLAN_EXIT=$?

        terraform show -json tfplan > plan.json

        if [ "${PLAN_EXIT:-0}" -eq 1 ]; then
          echo "[error]Terraform plan failed"
          exit 1
        elif [ "${PLAN_EXIT:-0}" -eq 2 ]; then
          echo "Changes detected - applying..."
          terraform apply -auto-approve tfplan
        else
          echo "No changes detected"
        fi
    displayName: Provision Terraform Resources

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: terraform/env/$(Build.SourceBranchName)/plan.json
      artifact: TerraformPlan-$(Build.SourceBranchName)
    condition: always()
    displayName: Publish Terraform Plan