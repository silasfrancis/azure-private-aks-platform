parameters:
  - name: azureSubscription
    type: string
  - name: agent_pool
    type: string

jobs:
- template: ./filter-directories.yaml
  parameters:
    services:
      - backend/fastapi
      - frontend/react-recoil
    agent_pool: ${{ parameters.agent_pool }}

- job: buildScanAndPush
  dependsOn: filterDirectories
  displayName: Build and Push to ACR
  variables:
    CHANGED_DIR: $[dependencies.filterDirectories.outputs['getUpdatedDirectories.dir_changed']]
    isMain: $[eq(variables['Build.SourceBranchName'], 'main')]
    isDev: $[eq(variables['Build.SourceBranchName'], 'dev')]
    arcMain: silasmain
    arcDev: silasdev
  strategy:
    matrix:
      backend:
        dir: backend/fastapi
      frontend:
        dir: frontend/react-recoil
  pool:
    name: ${{ parameters.agent_pool }}
  condition: ne(variables['CHANGED_DIR'], '')
  steps:
  - checkout: self
    persistCredentials: true
    displayName: Checkout Code

  - template: ../templated-steps/get-updated-dir.yaml
    parameters:
      changedDir: $(CHANGED_DIR)

  - script: |
     curl -sLf 'https://github.com/go-task/task/releases/download/v3.46.4/task_linux_amd64.tar.gz' \
      | sudo tar -xz -C /usr/local/bin task
     task --version
    condition: ne(variables['updated_dir'], '')
    displayName: Install Task CLI

  - script: |
        if [ "$(isMain)" == "True" ]; then
         tag=$(task -t utils/Taskfile.yaml generate-version -- "$(updated_dir)")
        else
         tag=$(task -t utils/Taskfile.yaml generate-extended-version -- "$(updated_dir)")
        fi
        echo "##vso[task.setvariable variable=image_tag]$tag"
    condition: ne(variables['updated_dir'], '')
    displayName: Generate image tag

  - task: Cache@2
    inputs:
      key: 'trivy-db | "$(Agent.OS)"'
      path: $(HOME)/.cache/trivy
    displayName: Cache Trivy DB

  - script: |
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      trivy --version
    condition: ne(variables['updated_dir'], '')
    displayName: Install Trivy

  - task: AzureCLI@2
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -e  
        
        az account show
        
        if [ "$IS_MAIN" == "True" ]; then
          acrName="$ACR_MAIN"
          target="production"
        else
          acrName="$ACR_DEV"
          target="dev"
        fi
        
        echo "=== Configuration ==="
        echo "ACR Name: $acrName"
        echo "Target: $target"
        echo "Directory: $UPDATED_DIR"
        echo "Image Tag: $IMAGE_TAG"
        
        # Login to ACR
        az acr login --name "$acrName"
        
        echo "=== Building Docker Image ==="
        docker build \
          -t "$acrName.azurecr.io/$UPDATED_DIR:$IMAGE_TAG" \
          "$UPDATED_DIR" \
          --target "$target"
        
        echo "=== Scanning Image with Trivy ==="
        if trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --no-progress \
          --cache-dir "$HOME/.cache/trivy" \
          "$acrName.azurecr.io/$UPDATED_DIR:$IMAGE_TAG"; then
          echo "No critical vulnerabilities found"
        else
          echo "##vso[task.logissue type=warning] Vulnerabilities found but continuing with deployment"
          echo "Please review and fix vulnerabilities in the next iteration"
        fi

        echo "=== Pushing Image to ACR ==="
        ACR_REPO="$acrName.azurecr.io/$UPDATED_DIR:$IMAGE_TAG"
        echo "$ACR_REPO"
        docker push "$ACR_REPO"
        echo "##vso[task.setvariable variable=image_repo]$ACR_REPO"
        
        echo "=== Complete ==="
    env:
      IS_MAIN: $(isMain)
      ACR_MAIN: $(arcMain)
      ACR_DEV: $(arcDev)
      UPDATED_DIR: $(updated_dir)
      IMAGE_TAG: $(image_tag)
    condition: ne(variables['updated_dir'], '')
    displayName: Build, Scan and Push Docker Image

  - script: |
      echo "{\"service\":\"$SERVICE\",\"image\":\"$IMAGE\"}" > output.json
      cat output.json
    condition: ne(variables['updated_dir'], '')
    displayName: Export build info
    env:
      SERVICE: $(updated_dir)
      IMAGE: $(image_repo)

  - script: |
      set -e

      echo "Processing directory: $UPDATED_DIR"

      if [ "$IS_MAIN" == "True" ]; then
        TARGET_DIR="helm/app/env/main"
      else
        TARGET_DIR="helm/app/env/dev"
      fi

      if [ "$UPDATED_DIR" == "backend/fastapi" ]; then
        TARGET_FILE="$TARGET_DIR/fastapi.json"
      elif [ "$UPDATED_DIR" == "frontend/react-recoil" ]; then
        TARGET_FILE="$TARGET_DIR/react-recoil.json"
      else
        echo "##vso[task.logissue type=error]$UPDATED_DIR is not a supported path"
        exit 1
      fi

      mkdir -p "$TARGET_DIR"
      mv output.json "$TARGET_FILE"

      git config user.name "Azure Pipeline"
      git config user.email "pipeline@example.com"
            
      git add "$TARGET_FILE"
      git diff-index --quiet HEAD || git commit -m "ci: update build info for $UPDATED_DIR [$BRANCH_NAME]"
      
      git pull --rebase origin "$BRANCH_NAME"
      git push origin HEAD:"$BRANCH_NAME"
    condition: ne(variables['updated_dir'], '')
    displayName: 'Persist build info to repo'
    env:
      GITHUB_PAT: $(GITHUB_PAT)
      UPDATED_DIR: $(updated_dir)
      IS_MAIN: $(isMain)
      BRANCH_NAME: $(Build.SourceBranchName)