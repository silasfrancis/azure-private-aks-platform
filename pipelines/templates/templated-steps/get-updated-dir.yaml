parameters:
  - name: changedDir
    type: string
    default: ''

steps:
- script: |
    if echo "${{ parameters.changedDir }}" | grep -q "$(dir)"; then
      echo "$(dir) was changed"
      echo "##vso[task.setvariable variable=updated_dir]$(dir)"
    else
      echo "$(dir) not changed"
    fi
  displayName: Get Updated Dir