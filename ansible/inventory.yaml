all:
  children:

    dev_runners:
      vars:
        azdevops_pool: "private-vm-pool-dev"
        keyvault_name: "silas-dev-key-vault"
        keyvault_secret_name: "DEV-RUNNER-PAT"
        environment: "dev"
      hosts:
        vm1:
          ansible_host: 10.0.1.5
          ansible_user: ansible_user
          ansible_ssh_private_key_file: ~/.ssh/ansible-dev.pem

    main_runners:
      vars:
        azdevops_pool: "private-vm-pool-main"
        keyvault_name: "silas-main-key-vault"
        keyvault_secret_name: "MAIN-RUNNER-PAT"
        environment: "main"
      hosts:
        vm2:
          ansible_host: 10.0.1.8
          ansible_user: ansible_user
          ansible_ssh_private_key_file: ~/.ssh/ansible-main.pem

    private_runners:
      children:
        dev_runners:
        main_runners: