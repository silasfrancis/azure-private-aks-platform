apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cm-acme-http-solver
  namespace: cert-manager
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/.well-known/acme-challenge/"
      backendRefs:
        - name: cm-acme-http-solver
          port: 8089